<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brilha Sonhos - Registro de Compras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 16px;
            color: #333;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header {
            background: linear-gradient(135deg, #4A5B8C 0%, #7B68A8 100%);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        
        .logo-img {
            height: 60px;
            width: auto;
            flex-shrink: 0;
        }
        
        .header-text h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 500;
            color: white;
        }
        
        .header-text p {
            margin: 3px 0 0 0;
            font-size: 12px;
            color: rgba(255,255,255,0.85);
        }
        
        .form-wrapper {
            padding: 1.25rem 1rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        
        select, input {
            width: 100%;
            padding: 10px;
            border: 0.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #4A5B8C;
            box-shadow: 0 0 0 3px rgba(74, 91, 140, 0.1);
        }
        
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-limpar {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-enviar {
            background: linear-gradient(135deg, #4A5B8C 0%, #7B68A8 100%);
            color: white;
        }
        
        .btn-enviar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }
        
        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://raw.githubusercontent.com/jgfranco72/brilha-sonhos/main/logo.png" alt="Brilha Sonhos" class="logo-img" />
            <div class="header-text">
                <h2>Registro de Compras</h2>
                <p>Brilha Sonhos - Parque Villa Lobos</p>
            </div>
        </div>
        
        <div class="form-wrapper">
            <div class="success-message" id="successMsg">✓ Compra registrada com sucesso!</div>
            <div class="error-message" id="errorMsg"></div>
            
            <form id="compraForm">
                <!-- Produto -->
                <div class="form-group">
                    <label for="produto" class="required">Produto</label>
                    <select id="produto" required>
                        <option value="">-- Selecione um produto --</option>
                    </select>
                </div>
                
                <!-- Quantidade -->
                <div class="form-group">
                    <label for="quantidade" class="required">Quantidade</label>
                    <input type="number" id="quantidade" min="1" value="1" required />
                </div>
                
                <!-- Preço -->
                <div class="form-group">
                    <label for="preco" class="required">Preço (R$)</label>
                    <input type="number" id="preco" step="0.01" min="0" placeholder="10,00" required />
                </div>
                
                <!-- Fornecedor -->
                <div class="form-group">
                    <label for="fornecedor" class="required">Fornecedor</label>
                    <input type="text" id="fornecedor" placeholder="Ex: Carrefour, Drogaria Xis" required />
                </div>
                
                <!-- Data -->
                <div class="form-group">
                    <label for="data">Data (automática)</label>
                    <input type="date" id="data" disabled style="background: #f5f5f5;" />
                </div>
                
                <!-- Botões -->
                <div class="buttons">
                    <button type="reset" class="btn-limpar">Limpar</button>
                    <button type="submit" class="btn-enviar">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SHEET_ID = '19LwuxbHSnIP9JAZ57heoWVQvLGB2N4gDLp8j-hCq758';
        let produtosData = [];
        
        // Carrega produtos ao abrir
        async function carregarProdutos() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
                const response = await fetch(url);
                const csv = await response.text();
                const linhas = csv.split('\n').filter(l => l.trim());
                
                if (linhas.length > 0) linhas.shift();
                
                produtosData = linhas
                    .filter(linha => linha.trim().length > 0)
                    .map(linha => {
                        const partes = linha.split(',').map(p => p.trim().replace(/^"|"$/g, ''));
                        return {
                            nome: partes[0],
                            ean: partes[1],
                            categoria: partes[2]
                        };
                    })
                    .filter(p => p.nome && p.ean);
                
                // Popula select - ignora a primeira linha (header "NOME DO PRODUTO")
                const select = document.getElementById('produto');
                select.innerHTML = '<option value="">-- Selecione um produto --</option>';
                produtosData.forEach((p, idx) => {
                    // Pula se for o header
                    if (p.nome && p.nome.toUpperCase() !== 'NOME DO PRODUTO') {
                        const option = document.createElement('option');
                        option.value = idx;
                        option.textContent = p.nome;
                        select.appendChild(option);
                    }
                });
                
                const optionNovo = document.createElement('option');
                optionNovo.value = 'novo';
                optionNovo.textContent = '+ Novo produto';
                select.appendChild(optionNovo);
                
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
                document.getElementById('errorMsg').textContent = 'Erro ao carregar produtos.';
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
        
        // Data padrão
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('data').value = hoje;
        
        // Enviar formulário
        document.getElementById('compraForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('.btn-enviar');
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            
            try {
                const produtoIdx = document.getElementById('produto').value;
                const quantidade = document.getElementById('quantidade').value;
                const preco = document.getElementById('preco').value;
                const fornecedor = document.getElementById('fornecedor').value;
                const data = document.getElementById('data').value;
                
                let ean, nomeProduto, categoria;
                
                if (produtoIdx === 'novo') {
                    ean = prompt('EAN do novo produto:');
                    nomeProduto = prompt('Nome do produto:');
                    categoria = prompt('Categoria (ACESSÓRIOS, BRINQUEDO, DECORAÇÃO, PAPELARIA, A DEFINIR):');
                    
                    if (!ean || !nomeProduto || !categoria) throw new Error('Dados incompletos');
                } else {
                    const produto = produtosData[produtoIdx];
                    ean = produto.ean;
                    nomeProduto = produto.nome;
                    categoria = produto.categoria;
                }
                
                const [ano, mes, dia] = data.split('-');
                const dataFormatada = `${dia}/${mes}`;
                
                // Envia para Apps Script
                const payload = {
                    data: data,
                    produto: nomeProduto,
                    ean: ean,
                    categoria: categoria,
                    quantidade: quantidade,
                    preco: parseFloat(preco).toFixed(2),
                    fornecedor: fornecedor
                };
                
                await fetch(formURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('compraForm').reset();
                document.getElementById('data').value = hoje;
                document.getElementById('quantidade').value = 1;
                document.getElementById('produto').value = '';
                
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 3000);
                
            } catch (error) {
                document.getElementById('errorMsg').textContent = error.message || 'Erro ao enviar';
                document.getElementById('errorMsg').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enviar';
            }
        });
        
        carregarProdutos();
    </script>
</body>
</html>
